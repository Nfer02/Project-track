<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>ProjectTrack — Cierre</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    background: #0a0f1a;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .bg-glow {
    position: absolute; top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    width: 1000px; height: 800px;
    background: radial-gradient(circle, rgba(59,130,246,0.07) 0%, rgba(139,92,246,0.03) 30%, transparent 65%);
    pointer-events: none;
  }
  .bg-dots {
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .content {
    position: relative; z-index: 1;
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 28px;
    max-width: 900px;
  }
  .headline {
    font-size: 58px; font-weight: 800; color: #f9fafb;
    letter-spacing: -2px; line-height: 1.15;
  }
  .sub {
    font-size: 28px; color: #9ca3af; font-weight: 400;
  }
  .cta-row {
    display: flex; gap: 20px; margin-top: 16px;
  }
  .btn {
    padding: 18px 52px; border-radius: 100px; font-size: 20px; font-weight: 700;
    text-decoration: none; cursor: pointer; border: none;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: #fff;
    box-shadow: 0 0 40px rgba(59,130,246,0.3), 0 8px 24px rgba(0,0,0,0.3);
  }
  .btn-outline {
    background: transparent;
    color: #e5e7eb;
    border: 2px solid #374151;
  }
  .pricing {
    display: flex; gap: 48px; margin-top: 24px;
  }
  .plan {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .plan-name {
    font-size: 16px; font-weight: 700; color: #9ca3af;
    text-transform: uppercase; letter-spacing: 2px;
  }
  .plan-price {
    font-size: 28px; font-weight: 800; color: #f9fafb;
  }
  .plan-desc {
    font-size: 16px; color: #6b7280;
  }
  .plan-price .period { font-size: 16px; font-weight: 400; color: #6b7280; }
  .divider {
    width: 2px; background: #1f2937; border-radius: 1px;
  }
  .footer {
    position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .footer-text {
    font-size: 18px; color: #4b5563;
  }
  .footer-domain {
    font-size: 16px; color: #6b7280; letter-spacing: 2px;
  }
  .accent-line {
    width: 80px; height: 4px;
    background: linear-gradient(90deg, #3b82f6, #8b5cf6);
    border-radius: 2px;
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-dots"></div>
  <div class="content">
    <div class="headline">Empieza a controlar<br>tu negocio</div>
    <div class="accent-line"></div>
    <div class="sub">Plan gratuito. Sin tarjeta. En 3 minutos.</div>
    <div class="cta-row">
      <button class="btn btn-primary">Empieza gratis</button>
      <button class="btn btn-outline">Ver mas en projecttrack.app</button>
    </div>
    <div class="pricing">
      <div class="plan">
        <div class="plan-name">Starter</div>
        <div class="plan-price">0 &euro;<span class="period">/mes</span></div>
        <div class="plan-desc">3 proyectos</div>
      </div>
      <div class="divider"></div>
      <div class="plan">
        <div class="plan-name">PRO</div>
        <div class="plan-price">14,99 &euro;<span class="period">/mes</span></div>
        <div class="plan-desc">Todo ilimitado</div>
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-text">Hecho en Espana &#127466;&#127480;</div>
    <div class="footer-domain">projecttrack.app</div>
  </div>
</body>
</html>
